name: Automation Smoke

on:
  push:
    paths:
      - 'demo-app/**'
      - 'automation/**'
      - 'docker-compose.yml'
      - '.github/workflows/automation-smoke.yml'
  pull_request:
    paths:
      - 'demo-app/**'
      - 'automation/**'
      - 'docker-compose.yml'
      - '.github/workflows/automation-smoke.yml'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      HIGHSPRING_BASE_URL: http://localhost:8080
      HIGHSPRING_HEADLESS: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Show tool versions
        run: |
          dotnet --version
          docker --version
          docker compose version
          chrome --version

      - name: Start application stack
        run: docker compose up -d --build

      - name: Wait for web health
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:8080/health > /dev/null; then
              echo "Web is healthy"
              exit 0
            fi
            echo "Waiting for web health... ($i/40)"
            sleep 3
          done
          echo "Web health check timed out"
          docker compose ps
          exit 1

      - name: Run Selenium smoke test
        run: dotnet test automation/Highspring.Automation.csproj --logger "trx;LogFileName=smoke.trx"

      - name: Capture docker logs
        if: always()
        run: |
          mkdir -p artifacts
          docker compose logs --no-color > artifacts/docker-compose.log

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-test-results
          path: |
            automation/TestResults/**/*.trx
            artifacts/docker-compose.log
          if-no-files-found: warn

      - name: Tear down stack
        if: always()
        run: docker compose down -v
