name: Automation Tests

on:
  push:
    paths:
      - 'demo-app/**'
      - 'automation/**'
      - 'docker-compose.yml'
      - '.github/workflows/automation-tests.yml'
  pull_request:
    paths:
      - 'demo-app/**'
      - 'automation/**'
      - 'docker-compose.yml'
      - '.github/workflows/automation-tests.yml'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite to run'
        required: true
        default: all
        type: choice
        options:
          - all
          - smoke
          - e2e

jobs:
  smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && (inputs.suite == 'all' || inputs.suite == 'smoke'))
    timeout-minutes: 25

    env:
      HIGHSPRING_BASE_URL: http://localhost:8080
      HIGHSPRING_API_BASE_URL: http://localhost:8081
      HIGHSPRING_HEADLESS: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Show tool versions
        run: |
          dotnet --version
          docker --version
          docker compose version
          chrome --version

      - name: Start application stack
        run: docker compose up -d --build

      - name: Wait for web health
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:8080/health > /dev/null; then
              echo "Web is healthy"
              exit 0
            fi
            echo "Waiting for web health... ($i/40)"
            sleep 3
          done
          echo "Web health check timed out"
          docker compose ps
          exit 1

      - name: Run Selenium smoke test
        run: dotnet test automation/Highspring.Automation.csproj --filter "Category=Smoke" --logger "trx;LogFileName=smoke.trx"

      - name: Capture docker logs
        if: always()
        run: |
          mkdir -p artifacts
          docker compose logs --no-color > artifacts/docker-compose.log

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-smoke-results
          path: |
            automation/TestResults/**/*.trx
            artifacts/docker-compose.log
          if-no-files-found: warn

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.suite == 'all' || inputs.suite == 'e2e'))
    timeout-minutes: 35

    env:
      HIGHSPRING_BASE_URL: http://localhost:8080
      HIGHSPRING_API_BASE_URL: http://localhost:8081
      HIGHSPRING_HEADLESS: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Show tool versions
        run: |
          dotnet --version
          docker --version
          docker compose version
          chrome --version

      - name: Start application stack
        run: docker compose up -d --build

      - name: Wait for web and api health
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:8080/health > /dev/null && curl -fsS http://localhost:8081/health > /dev/null; then
              echo "Web and API are healthy"
              exit 0
            fi
            echo "Waiting for web/api health... ($i/40)"
            sleep 3
          done
          echo "Health check timed out"
          docker compose ps
          exit 1

      - name: Run Selenium E2E suite
        run: dotnet test automation/Highspring.Automation.csproj --filter "Category=E2E" --logger "trx;LogFileName=e2e.trx"

      - name: Capture docker logs
        if: always()
        run: |
          mkdir -p artifacts
          docker compose logs --no-color > artifacts/docker-compose.log

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-e2e-results
          path: |
            automation/TestResults/**/*.trx
            artifacts/docker-compose.log
          if-no-files-found: warn

      - name: Tear down stack
        if: always()
        run: docker compose down -v
